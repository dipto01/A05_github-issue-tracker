<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub | Issue Tracker</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./myAssets/issue-icon.png" type="image/x-icon">
    <!-- link css -->
    <link rel="stylesheet" href="./styles/homeStyle.css">
    <!-- tailwind & daisyUI -cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awsome -cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#F8FAFC] min-h-screen">
    <nav>
            <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
        <!-- logo -->
        <a class="btn btn-ghost text-md lg:text-xl ml-0 lg:ml-6" href="./home.html">
            <img class="h-8" src="./assets/github-logo.png" alt="logo">GitHub Issues Tracker</a>
    </div>
    <div class="flex gap-2">
        <!-- Sarch box -->
            <label class="input">
    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <g
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2.5"
        fill="none"
        stroke="currentColor"
        >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
        </g>
    </svg>
    <input class="w-15 lg:w-min" type="search" required placeholder="Search issues..." />
    </label>
    <button class="btn btn-primary text-xs lg:text-md mr-2 lg:mr-8"><i class="fa-sharp fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i>New Issue</button>
    </div>
    </div>
    </nav>

    <!-- Tab Section -->

    <!-- Js connection -->
    <script src="./scripts/homeScript.js"></script>
</body>
</html>
