<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub | Issue Tracker</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./myAssets/issue-icon.png" type="image/x-icon">
    <!-- link css -->
    <link rel="stylesheet" href="./styles/homeStyle.css">
    <!-- tailwind & daisyUI -cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awsome -cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#F8FAFC] min-h-screen">
    <nav>
            <div class="navbar bg-base-100 shadow-sm">
    <div class="flex-1">
        <!-- logo -->
        <a class="btn btn-ghost text-md lg:text-xl ml-0 lg:ml-6" href="./home.html">
            <img class="h-8" src="./assets/github-logo.png" alt="logo">GitHub Issues Tracker</a>
    </div>
    <div class="flex gap-2">
        <!-- Sarch box -->
            <label class="input">
    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <g
        stroke-linejoin="round"
        stroke-linecap="round"
        stroke-width="2.5"
        fill="none"
        stroke="currentColor"
        >
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.3-4.3"></path>
        </g>
    </svg>
    <input class="w-15 lg:w-min" type="search" required placeholder="Search issues..." />
    </label>
    <button class="btn btn-primary text-xs lg:text-md mr-2 lg:mr-8"><i class="fa-sharp fa-solid fa-plus" style="color: rgb(255, 255, 255);"></i>New Issue</button>
    </div>
    </div>
    </nav>

    <!-- Tab Section -->
    <section class="tab-section ">
        <div class="mt-4 lg:mt-14 mx-4 lg:mx-40 bg-white shadow rounded-lg p-4 flex gap-2">
            <!-- add "btn-primary" class onClick! -->
            <button id="all-btn" class="btn button w-20 text-[#64748B]">All</button>
            <button id="open-btn" class="btn button w-20 text-[#64748B]">Open</button>
            <button id="closed-btn" class="btn button w-20 text-[#64748B]">Closed</button>
        </div>
        <!-- Issues Tab -->
        <div class="mt-4 mx-4 lg:mx-40 bg-white shadow rounded-lg rounded-b-none p-4 flex justify-between">
            <div class="flex">
                <div class="flex justify-center items-center bg-[#ECE4FF] rounded-full p-4 lg:p-3"><img src="./assets/Aperture.png" alt="issues"></div>
                <div class="ml-2">
                    <h3 class="font-bold text-lg"><span id="issueCounter">0</span> Issues</h3>
                    <p class="text-[#64748B]">Track and manage your project issues</p>
                </div>
            </div>
            <div class="flex flex-col lg:flex-row items-center gap-1 lg:gap-4 font-semibold">
                <p><i class="fa-solid fa-circle text-[10px] lg:text-[16px]" style="color: #00a96e;"></i> Open</p>
                <p><i class="fa-solid fa-circle text-[10px] lg:text-[16px]" style="color: #a855f7;"></i> Closed</p>
            </div>
        </div>
    </section>
    <!-- Loading Bar -->
    <div class="flex justify-center"> 
        <span id="loading" class="loading loading-bars loading-xl text-primary my-10 hidden"></span>   
    </div>
    <!-- Cards Section -->
    <section id="card-container" class="mt-0.5 mx-4 lg:mx-40 bg-[#FBFBFB] shadow rounded-lg rounded-t-none p-6 gap-4 grid grid-cols-4">
        <!-- Card Design -->
        
        <!-- Card! -->
    </section>

    <section>
<!-- Modal! -->
                <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
        <div id="modal_box" class="modal-box">
            <h3 class="text-[24px] font-bold">Fix broken image uploads</h3>
            <p class="my-2 text-[#64748B]">by john_doe : 2024-01-15T10:30:00Z</p>
            <div class="flex gap-3 mt-3">
                <p class="text-[#EF4444] font-semibold bg-[#FEECEC] px-3 rounded-2xl border-2 border-[#FECACA]"><i class="fa-solid fa-bug" style="color: #ef4444;"></i> BUG</p>
                <p class="text-[#EF4444] font-semibold bg-[#FEECEC] px-3 rounded-2xl border-2 border-[#FECACA]"><i class="fa-solid fa-bug" style="color: #ef4444;"></i> BUG</p>
            </div>
            <p class="my-2 text-[#64748B]">The navigation menu doesn't collapse properly on mobile devices. Need to fix the responsive behavior.</p>
            <div class="flex gap-24 bg-[#F8FAFC] p-4 rounded-xl">
                <div>
                    <p class="text-[#64748B]">Assignee:</p>
                    <p class="font-bold">Fahim Ahmed</p>
                </div>
                <div>
                    <p>Priority:</p>
                    <p class="text-[#EF4444] bg-[#FEECEC] px-4 rounded-xl">HIGH</p>
                </div>
            </div>
            <div class="modal-action">
            <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn btn-primary">Close</button>
            </form>
            </div>
        </div>
        </dialog>
<!-- Modal... -->
    </section>

    <section class="bumper bg-[#f8fafc]">
        <div class="p-6 bg-[#f8fafc]"></div>
    </section>

    <!-- Js connection -->
    <script src="./scripts/homeScript.js"></script>
</body>
</html>
