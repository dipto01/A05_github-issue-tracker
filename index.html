<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub | Issue Tracker</title>
    <!-- favicon -->
    <link rel="shortcut icon" href="./myAssets/issue-icon.png" type="image/x-icon">
    <!-- link css -->
    <link rel="stylesheet" href="./styles/loginStyle.css">
    <!-- tailwind & daisyUI -cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google font -geist -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <!-- font awsome -cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body class="bg-[#F8FAFC] min-h-screen flex justify-center">
    <section class="lg:rounded-lg lg:shadow px-0 lg:my-12 lg:px-6 lg:bg-white">
       <div>
        <div class="flex justify-center py-6">
            <img src="./assets/github-logo.png" alt="logo">
        </div>
        <h3 class="text-center text-2xl font-semibold">GitHub Issues Tracker</h3>
        <p class="text-center text-[#64748B]">Sign in to manage your issues</p>
       </div>
       <!-- password field -->
       <div class="login-section mt-2">
            <fieldset class="fieldset bg-[#F8FAFC] lg:bg-white rounded-box w-screens lg:w-md p-3">
            <label class="label text-black text-base font-medium">Username</label>
            <input id="user-Id" type="text" class="input w-auto rounded-lg" placeholder="Enter Username" />
                <p class="mb-2 text-[#4A00FF]">Default: admin</p>
            <label class="label text-black text-base font-medium">Password</label>
            <input id="pass" type="password" class="input w-auto rounded-lg" placeholder="Enter Password" />
                <p class="text-[#4A00FF]">Default: admin123</p>
            <button id="login-btn" class="btn mt-4 w-auto rounded-lg bg-[#4A00FF] text-white">Sign In</button>
            </fieldset>
       </div>
       <!-- divider??? -->
        <p class="divider">OR</p>
        <p class="text-center text-[#64748B] text-sm">Demo Credentials:</p>
       <div class="bg-[#F8FAFC] rounded-lg h-24 mt-2 flex items-center justify-center flex-col">
        <p class="text-center"><span class="font-semibold">Username:</span> admin</p>
        <p class="text-center"><span class="font-semibold">Password:</span> admin123</p>
       </div>
    </section>



    <!-- Js connection -->
    <script src="./scripts/loginScript.js"></script>
</body>
</html>
